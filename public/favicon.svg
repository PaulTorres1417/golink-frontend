<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #fff;
        --fg: #000;
      }
    }
  </style>

  <circle cx="50" cy="50" r="45" fill="var(--bg)" />

  <text x="50" y="50"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Arial, sans-serif"
        font-size="52"
        font-weight="700"
        fill="var(--fg)">
    G
  </text>
</svg>