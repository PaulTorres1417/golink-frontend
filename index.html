<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Golinx: The platform to share posts, comments, and connect with friends." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500;700&family=Changa+One:ital@0;1&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet">

  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500;700&family=Changa+One:ital@0;1&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" />
  </noscript>

  <script>
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.write('<style>#splash{background:' + (theme === 'dark' ? '#000' : '#fff') + '}</style>');

    document.addEventListener('DOMContentLoaded', () => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.background = theme === 'dark' ? '#000' : '#fff';
      }
    });
  </script>

  <title>golinx</title>
</head>

<body>
  <div id="root">
    <span id="splash" style="
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;">
      <span style="
        font-family: 'Nunito', sans-serif;
        font-size: 60px;
        font-weight: 800;
        letter-spacing: -1px;
        background: linear-gradient(120deg, #5484b4ff 0%, #0151ffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;">
        <span style="
          display: inline-block;
          background: linear-gradient(120deg, #407ddfff 0%, #7453d6ff 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;">GO</span>LINX
      </span>
    </span>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
